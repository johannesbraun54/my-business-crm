<form (ngSubmit)="saveUser()" #addUserForm="ngForm">
  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>
  <h2 mat-dialog-title>Nutzer hinzufügen</h2>
  <mat-dialog-content>
    <div>
      <mat-form-field class="mr-16" appearance="outline">
        <mat-label>Vorname</mat-label>
        <input [disabled]="loading" #firstname="ngModel" minlength="2" [(ngModel)]="user.firstName" matInput
          placeholder="First name" name="firstName" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Nachname</mat-label>
        <input #lastName="ngModel" [disabled]="loading" minlength="2" [(ngModel)]="user.lastName" matInput
          placeholder="Last name" name="lastName" required>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>email</mat-label>
        <input #email="ngModel" [disabled]="loading" [(ngModel)]="user.email" matInput placeholder="email" name="email"
          required>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Birth Date</mat-label>
        <input #birthdate="ngModel" [disabled]="loading" [(ngModel)]="birthDate" matInput placeholder="Placeholder"
          [matDatepicker]="picker1" name="birthDate" required>
        <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
        <mat-datepicker #picker1></mat-datepicker>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Street + House No</mat-label>
        <input #street="ngModel" [disabled]="loading" [(ngModel)]="user.street" matInput placeholder="Placeholder"
           name="street" required>
      </mat-form-field>
    </div>

    <div>
      <mat-form-field class="mr-16" appearance="outline">
        <mat-label>Zip Code</mat-label>
        <input #zipcode="ngModel" pattern="^\d{5}$" [disabled]="loading" [(ngModel)]="user.zipCode" matInput
          placeholder="Placeholder" name="zipcode" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input #city="ngModel" minlength="2" [disabled]="loading" [(ngModel)]="user.city" matInput
          placeholder="Placeholder" name="city" required>
      </mat-form-field>
    </div>

  </mat-dialog-content>
  <mat-dialog-actions>
    <button (click)=" this.dialogRef.close()" mat-button name="saveBtn">Cancel</button>
    <button
      [disabled]="!firstname.valid || !lastName.valid || !email.valid || !birthdate.valid || !street.valid || !zipcode.valid || !city.valid "
      mat-button (click)="saveUser()" cdkFocusInitial name="cancel">Save</button>
  </mat-dialog-actions>

</form>
