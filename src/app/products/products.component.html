<mat-form-field class="example-full-width">
    <mat-label>Product suchen</mat-label>
    <input [(ngModel)]="userService.searchTerm" (keyup)="userService.searchItem()" matInput placeholder="User oder Stadt suchen">
  </mat-form-field>
<mat-card>
    <mat-card-content>
        <table class="product-table">
            <thead>
                <tr class="cursor-unset">
                    <th>Meal</th>
                    <th>Price</th>
                </tr>
            </thead>
            
            <tbody>
                <tr *ngFor="let meal of allMeals"  [routerLink]="['/products/' + meal.mealId]">
                    <td>{{meal.mealName}}</td>
                    <td>{{meal.price}}</td>
                </tr>
            </tbody>
        </table>
    </mat-card-content>
</mat-card>

<button (click)="openDialog()" class="dialog-add-btn" mat-fab color="primary" matTooltip="Add Meal">
    <mat-icon>add</mat-icon>
</button>
